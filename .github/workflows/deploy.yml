name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow triggering manually from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required by the Pages deployment action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on new pushes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # The game is pure static HTML/JS/CSS — no build step needed.
      # Upload the whole repo root as the Pages artifact.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
