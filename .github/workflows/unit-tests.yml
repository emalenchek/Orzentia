name: Unit Tests

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # node:test is built-in since Node 18; no npm install needed
          node-version: '20'

      - name: Run unit tests
        run: npm run test:unit
