<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css">
    <title>Orzentia</title>
</head>
<body>
    <div class="container">
        <div class="canvas-container">
            <canvas id="game-canvas" width="500" height="500"></canvas>
        </div>

        <!-- Virtual controls — hidden on desktop, shown on touch devices -->
        <div class="mobile-controls">
            <div class="dpad">
                <button id="btn-up"    class="dpad-btn dpad-up"    aria-label="Move up">&#9650;</button>
                <button id="btn-left"  class="dpad-btn dpad-left"  aria-label="Move left">&#9664;</button>
                <button id="btn-right" class="dpad-btn dpad-right" aria-label="Move right">&#9654;</button>
                <button id="btn-down"  class="dpad-btn dpad-down"  aria-label="Move down">&#9660;</button>
            </div>
            <div class="action-buttons">
                <button id="btn-magic"    class="action-btn"          aria-label="Cast magic">&#10022;</button>
                <button id="btn-pause"    class="action-btn"          aria-label="Pause">&#9646;&#9646;</button>
                <button id="btn-light"    class="action-btn stub-btn" aria-label="Light attack">Z</button>
                <button id="btn-heavy"    class="action-btn stub-btn" aria-label="Heavy attack">X</button>
                <button id="btn-interact" class="action-btn stub-btn" aria-label="Interact">F</button>
            </div>
        </div>

        <!-- Preloaded sprite assets -->
        <img id="player-sprites" style="display: none;" src="./assets/spritesheets/heroSprites.png" alt="player spritesheet">
        <img id="world-sprites" style="display: none;" src="./assets/spritesheets/Overworld.png" alt="world sprites">
        <img src="./assets/OrzentiaOverworld.png" alt="world-image" id="world-image" style="display:none;">
    </div>
    <!-- GAME LOGIC -->
    <script src="./engine/GameState.js"></script>
    <script src="./engine/GUI.js"></script>
    <script src="./engine/SceneManager.js"></script>
    <script src="./engine/Game.js"></script>
    <script src="index.js"></script>
</body>
</html>
